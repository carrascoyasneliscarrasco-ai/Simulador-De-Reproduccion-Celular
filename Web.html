<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Mitosis · 6to Grado</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-top:#080c1c;--bg-bot:#121c37;
  --panel-bg:rgba(20,28,58,.88);--panel-border:rgba(70,100,200,.7);
  --accent:#64dcff;--text-white:#ebf5ff;--text-dim:#6e87b9;--text-dark:#0c1024;
}
html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,var(--bg-top),var(--bg-bot));font-family:'Exo 2',sans-serif;color:var(--text-white);user-select:none}
#app{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center}
#bgCanvas{position:absolute;inset:0;pointer-events:none;z-index:0}
#infoPanel{position:relative;z-index:2;width:calc(100% - 32px);max-width:900px;margin:14px auto 0;background:var(--panel-bg);border:1.5px solid var(--panel-border);border-radius:18px;backdrop-filter:blur(12px);padding:16px 22px 14px;display:flex;align-items:flex-start;gap:18px;box-shadow:0 0 40px rgba(30,60,160,.3);transition:border-color .5s}
#phaseNumber{font-family:'Orbitron',monospace;font-size:2.6rem;font-weight:900;line-height:1;min-width:42px;transition:color .5s}
#phaseInfo{flex:1}
#phaseName{font-family:'Orbitron',monospace;font-size:1.05rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;transition:color .5s}
#phaseDesc{font-size:.85rem;color:var(--text-dim);line-height:1.5}
#mainCanvas{position:relative;z-index:1;flex:1;width:100%;max-width:900px;display:block}
#bottomBar{position:relative;z-index:2;width:calc(100% - 32px);max-width:900px;margin:0 auto 14px;display:flex;flex-direction:column;align-items:center;gap:10px}
#phaseChips{display:flex;gap:6px;width:100%}
.chip{flex:1;height:34px;border-radius:10px;border:1.5px solid transparent;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-family:'Exo 2',sans-serif;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:all .35s;background:var(--panel-bg)}
.chip.active{color:var(--text-dark);border-color:transparent}
.chip:not(.active):hover{opacity:.8;transform:translateY(-2px)}
#controls{display:flex;align-items:center;gap:16px;width:100%;justify-content:center}
.navBtn{width:46px;height:46px;border-radius:50%;border:1.5px solid var(--panel-border);background:var(--panel-bg);color:var(--accent);font-size:1.2rem;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
.navBtn:hover{background:rgba(70,100,200,.35);transform:scale(1.08);box-shadow:0 0 18px rgba(100,220,255,.3)}
.navBtn:active{transform:scale(.95)}
#hint{font-size:.72rem;color:var(--text-dim);letter-spacing:.06em}
#pulseDot{position:absolute;bottom:60px;right:18px;width:10px;height:10px;border-radius:50%;background:var(--accent);z-index:3;animation:pulsate 1.8s ease-in-out infinite}
@keyframes pulsate{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.5);box-shadow:0 0 10px var(--accent)}}
#startOverlay{position:fixed;inset:0;z-index:100;background:rgba(8,12,28,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;cursor:pointer;backdrop-filter:blur(6px)}
#startTitle{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;color:#64dcff;letter-spacing:.1em;text-shadow:0 0 30px #64dcff88}
#startSub{font-family:'Exo 2',sans-serif;font-size:1rem;color:#6e87b9}
#startBtn{margin-top:8px;padding:14px 38px;border-radius:30px;background:linear-gradient(135deg,#c83c50,#f05a6e);color:#fff;font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;letter-spacing:.1em;animation:pulse2 1.6s ease-in-out infinite}
@keyframes pulse2{0%,100%{box-shadow:0 0 20px rgba(200,60,80,.4)}50%{box-shadow:0 0 40px rgba(240,90,110,.8)}}
@media(max-width:600px){#phaseNumber{font-size:1.8rem}#phaseName{font-size:.85rem}#phaseDesc{font-size:.75rem}.chip{font-size:.6rem;height:28px}.navBtn{width:38px;height:38px;font-size:1rem}}
</style>
</head>
<body>
<div id="startOverlay">
  <div id="startTitle">&#128302; MITOSIS</div>
  <div id="startSub">Simulador &middot; 6to Grado</div>
  <div id="startBtn">&#9654; INICIAR</div>
</div>
<div id="app">
  <canvas id="bgCanvas"></canvas>
  <div id="infoPanel">
    <div id="phaseNumber">1</div>
    <div id="phaseInfo">
      <div id="phaseName">&#127807; INTERFASE</div>
      <div id="phaseDesc">La c&eacute;lula crece y duplica su ADN. El n&uacute;cleo est&aacute; intacto y los cromosomas no son visibles.</div>
    </div>
  </div>
  <canvas id="mainCanvas"></canvas>
  <div id="pulseDot"></div>
  <div id="bottomBar">
    <div id="phaseChips"></div>
    <div id="controls">
      <button class="navBtn" id="btnPrev">&#9664;</button>
      <span id="hint">&#9664; &#9654; Teclado &middot; Clic para navegar</span>
      <button class="navBtn" id="btnNext">&#9654;</button>
    </div>
  </div>
</div>
<script>
var PHASES=[
  {name:"Interfase",emoji:"\uD83C\uDF31",color:[60,190,120],desc:"La c\u00E9lula crece y duplica su ADN. El n\u00FAcleo est\u00E1 intacto y los cromosomas no son visibles."},
  {name:"Profase",emoji:"\uD83D\uDD2C",color:[220,140,55],desc:"La membrana nuclear se deshace. Los cromosomas se condensan y se hacen visibles."},
  {name:"Metafase",emoji:"\u2696\uFE0F",color:[90,155,255],desc:"Los cromosomas se alinean perfectamente en el ecuador (centro) de la c\u00E9lula."},
  {name:"Anafase",emoji:"\uD83D\uDE80",color:[220,75,165],desc:"Las crom\u00E1tidas hermanas se separan y son jaladas hacia polos opuestos."},
  {name:"Telofase",emoji:"\uD83C\uDF19",color:[160,100,255],desc:"Se forman dos nuevos n\u00FAcleos. La c\u00E9lula se estira y se prepara para dividirse."},
  {name:"Citocinesis",emoji:"\u2702\uFE0F",color:[70,215,195],desc:"La c\u00E9lula se divide f\u00EDsicamente. \u00A1Ahora hay dos c\u00E9lulas hijas id\u00E9nticas!"}
];
var C={cellFill:[30,65,130],cellGlow:[90,160,255],nucleusFill:[210,70,110],nucleusGlow:[255,130,170],chromoA:[255,80,80],chromoB:[80,190,255],spindle:[220,210,90],accent:[100,220,255]};
var phase=0,tGlobal=0,transitioning=false,transT=0,transFrom=0,transTo=0,lastTime=null;
var rng=(function(seed){var s=seed;return function(){s=(s*1664525+1013904223)&0xFFFFFFFF;return(s>>>0)/0xFFFFFFFF;};})(42);
var stars=[];for(var _i=0;_i<110;_i++){stars.push({x:rng()*1920,y:rng()*1080,r:0.5+rng()*1.8,ph:rng()*Math.PI*2});}
function ease(t){return t*t*(3-2*t);}
function lerp(a,b,t){return a+(b-a)*t;}
function rgb(c,a){a=a===undefined?1:a;return"rgba("+c[0]+","+c[1]+","+c[2]+","+a+")";}
function glow(ctx,color,cx,cy,r,intensity,steps){
  intensity=intensity||70;steps=steps||7;
  for(var i=steps;i>0;i--){
    var gr=r+i*9;
    var a=intensity/255*Math.pow(i/steps,1.5)*0.45;
    ctx.beginPath();
    var g=ctx.createRadialGradient(cx,cy,0,cx,cy,gr);
    g.addColorStop(0,rgb(color,a));g.addColorStop(1,rgb(color,0));
    ctx.fillStyle=g;ctx.arc(cx,cy,gr,0,Math.PI*2);ctx.fill();
  }
}
function circle(ctx,color,cx,cy,r,alpha,lw){
  alpha=alpha===undefined?1:alpha;lw=lw||0;
  if(r<=0)return;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  if(lw>0){ctx.strokeStyle=rgb(color,alpha);ctx.lineWidth=lw;ctx.stroke();}
  else{ctx.fillStyle=rgb(color,alpha);ctx.fill();}
}
function ellipse(ctx,color,cx,cy,rx,ry,alpha,lw){
  alpha=alpha===undefined?1:alpha;lw=lw||0;
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  if(lw>0){ctx.strokeStyle=rgb(color,alpha);ctx.lineWidth=lw;ctx.stroke();}
  else{ctx.fillStyle=rgb(color,alpha);ctx.fill();}
}
function chromo(ctx,color,cx,cy,size,alpha){
  size=size||13;alpha=alpha===undefined?1:alpha;
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle=rgb(color,1);ctx.lineWidth=5;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(cx-size,cy-size);ctx.lineTo(cx+size,cy+size);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+size,cy-size);ctx.lineTo(cx-size,cy+size);ctx.stroke();
  ctx.strokeStyle="rgba(255,255,255,"+(alpha*0.25)+")";ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx-size+1,cy-size+1);ctx.lineTo(cx+size+1,cy+size+1);ctx.stroke();
  ctx.restore();
}
function drawPhase(ctx,idx,t,cx,cy){
  var pulse=1+0.04*Math.sin(t*Math.PI*5);
  if(idx===0){
    var r=Math.round(130*pulse);
    glow(ctx,C.cellGlow,cx,cy,r,65);circle(ctx,C.cellFill,cx,cy,r,0.59);circle(ctx,C.cellGlow,cx,cy,r,1,2);
    var nr=Math.round(58*(1+0.07*Math.sin(t*Math.PI*3)));
    glow(ctx,C.nucleusGlow,cx,cy,nr,90,5);circle(ctx,C.nucleusFill,cx,cy,nr,0.67);circle(ctx,C.nucleusGlow,cx,cy,nr,1,2);
    for(var i=0;i<55;i++){var ang=t*Math.PI*5+i*0.28;circle(ctx,[140,255,160],Math.round(cx+25*Math.cos(ang)*Math.sin(i*0.18)),Math.round(cy+25*Math.sin(ang)*Math.cos(i*0.18)),2,(140+80*Math.sin(i*0.6))/255);}
  } else if(idx===1){
    glow(ctx,C.cellGlow,cx,cy,130,65);circle(ctx,C.cellFill,cx,cy,130,0.59);circle(ctx,C.cellGlow,cx,cy,130,1,2);
    var na=210*(1-ease(Math.min(t/0.8,1)))/255;
    if(na>0.03){glow(ctx,C.nucleusGlow,cx,cy,58,na*255/2,4);circle(ctx,C.nucleusFill,cx,cy,58,na);circle(ctx,C.nucleusGlow,cx,cy,58,na,2);}
    var pos=[[-35,-28],[28,14],[-12,34],[32,-32],[-28,22]];
    for(var i=0;i<pos.length;i++){var dx=pos[i][0],dy=pos[i][1];var ca=Math.min(1,(60+190*ease(Math.min(t,1)))/255)*(0.55+0.45*Math.sin(t*5+i));var sc=1+0.25*Math.sin(t*3.5+i*1.4);chromo(ctx,C.chromoA,Math.round(cx+dx*sc),Math.round(cy+dy*sc),11,ca);}
  } else if(idx===2){
    glow(ctx,C.cellGlow,cx,cy,130,65);circle(ctx,C.cellFill,cx,cy,130,0.59);circle(ctx,C.cellGlow,cx,cy,130,1,2);
    ctx.save();ctx.globalAlpha=0.27;ctx.strokeStyle=rgb(C.spindle,1);ctx.lineWidth=1;
    var pxs=[cx-115,cx+115];for(var p=0;p<pxs.length;p++){for(var i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(pxs[p],cy);ctx.lineTo(cx,cy+i*28);ctx.stroke();}}
    ctx.restore();
    for(var i=-2;i<=2;i++){var wb=Math.round(3*Math.sin(t*4.5+i));chromo(ctx,C.chromoA,cx-13,cy+i*28+wb,12);chromo(ctx,C.chromoB,cx+13,cy+i*28+wb,12);}
  } else if(idx===3){
    var et=ease(Math.min(t,1));var rx=Math.round(130+35*et);var ry=Math.round(130-22*et);
    glow(ctx,C.cellGlow,cx,cy,Math.max(rx,ry),60);ellipse(ctx,C.cellFill,cx,cy,rx,ry,0.59);ellipse(ctx,C.cellGlow,cx,cy,rx,ry,1,2);
    var sep=Math.round(55+65*et);
    for(var i=-2;i<=2;i++){chromo(ctx,C.chromoA,cx-sep,cy+i*28,12);chromo(ctx,C.chromoB,cx+sep,cy+i*28,12);}
  } else if(idx===4){
    var et=ease(Math.min(t,1));var rx=Math.round(130+28*et);var ry=Math.round(130-18*et);
    glow(ctx,C.cellGlow,cx,cy,Math.max(rx,ry),60);ellipse(ctx,C.cellFill,cx,cy,rx,ry,0.59);ellipse(ctx,C.cellGlow,cx,cy,rx,ry,1,2);
    var sep=Math.round(55+55*et);
    var sides=[[-1,C.chromoA],[1,C.chromoB]];
    for(var s=0;s<sides.length;s++){var sign=sides[s][0];var col=sides[s][1];var cxn=cx+sign*sep;var nr=Math.round(30+20*et);glow(ctx,C.nucleusGlow,cxn,cy,nr,80,4);circle(ctx,C.nucleusFill,cxn,cy,nr,0.65);circle(ctx,C.nucleusGlow,cxn,cy,nr,1,2);for(var i=-1;i<=1;i++)chromo(ctx,col,cxn+i*13,cy,8);}
    if(et>0.5){var lt=(et-0.5)*2;ctx.save();ctx.globalAlpha=lt*0.6;ctx.strokeStyle=rgb(C.cellGlow,1);ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(cx,cy-ry*lt);ctx.lineTo(cx,cy+ry*lt);ctx.stroke();ctx.restore();}
  } else if(idx===5){
    var et=ease(Math.min(t,1));var sep=Math.round(28+115*et);
    var sides=[[-1,C.chromoA],[1,C.chromoB]];
    for(var s=0;s<sides.length;s++){var sign=sides[s][0];var col=sides[s][1];var cxn=cx+sign*sep;glow(ctx,C.cellGlow,cxn,cy,92,85);circle(ctx,C.cellFill,cxn,cy,92,0.61);circle(ctx,C.cellGlow,cxn,cy,92,1,2);glow(ctx,C.nucleusGlow,cxn,cy,36,90,4);circle(ctx,C.nucleusFill,cxn,cy,36,0.65);circle(ctx,C.nucleusGlow,cxn,cy,36,1,2);for(var i=-1;i<=1;i++)chromo(ctx,col,cxn+i*13,cy,7);}
  }
}
var bgCanvas=document.getElementById("bgCanvas");
var mainCanvas=document.getElementById("mainCanvas");
var bgCtx=bgCanvas.getContext("2d");
var mainCtx=mainCanvas.getContext("2d");
var phaseNumberEl=document.getElementById("phaseNumber");
var phaseNameEl=document.getElementById("phaseName");
var phaseDescEl=document.getElementById("phaseDesc");
var chipsEl=document.getElementById("phaseChips");
var infoPanelEl=document.getElementById("infoPanel");
PHASES.forEach(function(p,i){
  var ch=document.createElement("div");ch.className="chip"+(i===0?" active":"");
  ch.textContent=p.emoji+" "+p.name;
  ch.style.color=i===0?"#0c1024":"rgb("+p.color+")";ch.style.borderColor="rgb("+p.color+")";
  if(i===0)ch.style.background="rgb("+p.color+")";
  ch.addEventListener("click",function(idx){return function(){if(!transitioning&&idx!==phase)navigate(idx-phase);};}(i));
  chipsEl.appendChild(ch);
});
function updateUI(){
  var p=PHASES[phase];
  phaseNumberEl.textContent=phase+1;phaseNumberEl.style.color="rgb("+p.color+")";
  phaseNameEl.textContent=p.emoji+"  "+p.name.toUpperCase();phaseNameEl.style.color="rgb("+p.color+")";
  phaseDescEl.textContent=p.desc;
  infoPanelEl.style.borderColor="rgba("+p.color+",.6)";
  var chips=chipsEl.children;
  for(var i=0;i<chips.length;i++){
    var cp=PHASES[i];chips[i].classList.toggle("active",i===phase);
    chips[i].style.color=i===phase?"#0c1024":"rgb("+cp.color+")";
    chips[i].style.background=i===phase?"rgb("+cp.color+")":"var(--panel-bg)";
    chips[i].style.borderColor="rgb("+cp.color+")";
  }
}
function resize(){bgCanvas.width=window.innerWidth;bgCanvas.height=window.innerHeight;mainCanvas.width=mainCanvas.offsetWidth;mainCanvas.height=mainCanvas.offsetHeight;}
resize();window.addEventListener("resize",resize);

var currentAudio=null;
function playAudio(idx){
  if(currentAudio){try{currentAudio.pause();currentAudio.currentTime=0;}catch(e){}}
  var a=new Audio(audioURLs[AUDIO_KEYS[idx]]);
  a.volume=0.9;currentAudio=a;
  a.play().catch(function(e){console.log("audio:",e.message);});
}
function navigate(direction){
  if(transitioning)return;
  transFrom=phase;transTo=((phase+direction)%PHASES.length+PHASES.length)%PHASES.length;
  transT=0;transitioning=true;
  playAudio(transTo);
}
document.getElementById("btnNext").addEventListener("click",function(){navigate(+1);});
document.getElementById("btnPrev").addEventListener("click",function(){navigate(-1);});
document.addEventListener("keydown",function(e){if(e.key==="ArrowRight")navigate(+1);if(e.key==="ArrowLeft")navigate(-1);});
document.getElementById("startOverlay").addEventListener("click",function(){
  this.style.display="none";playAudio(0);
});
function drawBackground(){
  var w=bgCanvas.width,h=bgCanvas.height;
  var grad=bgCtx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,"#080c1c");grad.addColorStop(1,"#121c37");
  bgCtx.fillStyle=grad;bgCtx.fillRect(0,0,w,h);
  for(var i=0;i<stars.length;i++){var s=stars[i];var a=0.39+0.35*Math.sin(s.ph);bgCtx.beginPath();bgCtx.arc(s.x%w,s.y%h,s.r,0,Math.PI*2);bgCtx.fillStyle="rgba(200,220,255,"+a+")";bgCtx.fill();}
}
function frame(ts){
  requestAnimationFrame(frame);
  var dt=lastTime==null?0.016:Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  tGlobal+=dt;for(var i=0;i<stars.length;i++)stars[i].ph+=dt*0.75;
  if(transitioning){transT+=dt*2.6;if(transT>=1){phase=transTo;transT=0;transitioning=false;updateUI();}}
  drawBackground();
  var W=mainCanvas.width,H=mainCanvas.height;mainCtx.clearRect(0,0,W,H);
  var cx=W>>1,cy=H>>1;var pc=PHASES[phase].color;
  mainCtx.save();mainCtx.globalAlpha=0.07;mainCtx.beginPath();mainCtx.arc(cx,cy,168,0,Math.PI*2);mainCtx.strokeStyle="rgb("+pc+")";mainCtx.lineWidth=22;mainCtx.stroke();mainCtx.restore();
  if(transitioning){
    var fo=1-ease(transT);var fi=ease(transT);
    var offA=document.createElement("canvas");offA.width=W;offA.height=H;var ctxA=offA.getContext("2d");drawPhase(ctxA,transFrom,tGlobal%1,cx,cy);mainCtx.save();mainCtx.globalAlpha=fo;mainCtx.drawImage(offA,0,0);mainCtx.restore();
    var offB=document.createElement("canvas");offB.width=W;offB.height=H;var ctxB=offB.getContext("2d");drawPhase(ctxB,transTo,tGlobal%1,cx,cy);mainCtx.save();mainCtx.globalAlpha=fi;mainCtx.drawImage(offB,0,0);mainCtx.restore();
  } else {drawPhase(mainCtx,phase,tGlobal%1,cx,cy);}
}
updateUI();requestAnimationFrame(frame);
